name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Format check (ruff format)
        run: uv run ruff format --check src/

      - name: Run tests
        run: uv run pytest

  test-full:
    name: Full suite (Python 3.11, all extras)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # stardist pulls in tensorflow which is large; skip it to keep CI fast.
      # Everything else in [all] is installed: optuna, mlflow, mcp, dev tools.
      - name: Install dependencies (all extras minus stardist)
        run: uv sync --extra tracking --extra mcp --extra dev

      - name: Run tests including optional-dep paths
        run: uv run pytest tests/ tests/integration/ -m "not slow" -v
